{% extends "base.html" %}

{% block title %}Tags # {{ SITENAME }}{% endblock %}

{% block content %}
	<h1>Tags</h1>
	<div class="article-tags">
	    <ul class="tags">
		    {% for tag, articles in tags|sort %}
		        <li><a class="tag" href="{{ SITEURL }}/tag/{{ tag.slug }}">{{ tag.name }}</a><span style="margin-right:20px;margin-left:-5px">({{ articles|count }})</span></li>
		    {% endfor %}
	    </ul>
	</div>
	<br/>
	<br/>
{% endblock %}
